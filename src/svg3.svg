<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Dark Background -->
  <rect width="600" height="400" fill="#1A1A1A" rx="12"/>

  <!-- Ornate Border -->
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="#C9931A" stroke-width="4" rx="8"/>
  <rect x="28" y="28" width="544" height="344" fill="none" stroke="#E8B040" stroke-width="1" rx="6" stroke-dasharray="3 3"/>
  <rect x="34" y="34" width="532" height="332" fill="none" stroke="#C9931A" stroke-width="1.5" rx="4"/>

  <!-- Corner Decorations -->
  <!-- Top Left -->
  <path d="M 20 50 L 50 20 M 20 60 L 60 20 M 20 40 L 40 20" stroke="#C9931A" stroke-width="2"/>
  <!-- Top Right -->
  <path d="M 580 50 L 550 20 M 580 60 L 540 20 M 580 40 L 560 20" stroke="#C9931A" stroke-width="2"/>
  <!-- Bottom Left -->
  <path d="M 20 350 L 50 380 M 20 340 L 60 380 M 20 360 L 40 380" stroke="#C9931A" stroke-width="2"/>
  <!-- Bottom Right -->
  <path d="M 580 350 L 550 380 M 580 340 L 540 380 M 580 360 L 560 380" stroke="#C9931A" stroke-width="2"/>

  <!-- Certificate Heading -->
  <g text-anchor="middle">
    <!-- Subtitle/Organization -->
    <text x="300" y="80" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="16" fill="#E8B040" letter-spacing="4">BOBSOFT INTEGRATED SERVICES</text>
    
    <!-- Decorative Separator -->
    <path d="M 200 95 L 400 95" stroke="#C9931A" stroke-width="1" stroke-linecap="round"/>
    <polygon points="300,92 305,95 300,98 295,95" fill="#C9931A"/>
    
    <!-- Main Title -->
    <text x="300" y="145" font-family="'Sora', sans-serif" font-weight="800" font-size="34" fill="#FDF3DC" letter-spacing="1">CERTIFICATE OF COMPLETION</text>
    
    <!-- Text body -->
    <text x="300" y="185" font-family="'Space Grotesk', sans-serif" font-weight="400" font-size="14" fill="#A1A1AA" font-style="italic">This is proudly presented to</text>
    
    <!-- Student Name Placeholder -->
    <text x="300" y="230" font-family="'Sora', sans-serif" font-weight="800" font-size="28" fill="#C9931A" letter-spacing="0.5">EXCELLENT IT STUDENT</text>
    
    <!-- Underline under name -->
    <line x1="150" y1="245" x2="450" y2="245" stroke="#E8B040" stroke-width="2"/>

    <!-- Course Accomplishment statement -->
    <text x="300" y="275" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="13" fill="#A1A1AA">for successfully completing 24 weeks of intensive, hands-on, practical</text>
    <text x="300" y="295" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="14" fill="#FDF3DC" letter-spacing="1">INDUSTRIAL TRAINING COHORT (AUGUST 2026)</text>
  </g>

  <!-- Gold Seal with Ribbon in bottom right area -->
  <g transform="translate(480, 310)">
    <!-- Ribbon -->
    <path d="M -20 20 L -30 70 L 0 50 L 30 70 L 20 20 Z" fill="#E8B040" opacity="0.8"/>
    <path d="M -10 20 L -15 80 L 10 65 L 35 80 L 30 20 Z" fill="#C9931A" opacity="0.9"/>
    
    <!-- Seal Star/Spokes -->
    <circle cx="10" cy="10" r="32" fill="#E8B040" stroke="#C9931A" stroke-width="2"/>
    <!-- Serrated teeth (simulated with standard shapes) -->
    <circle cx="10" cy="10" r="26" fill="#C9931A" stroke="#FDF3DC" stroke-dasharray="3 3"/>
    <circle cx="10" cy="10" r="20" fill="#E8B040"/>
    <text x="10" y="15" font-family="'Sora', sans-serif" font-weight="800" font-size="13" fill="#1A1A1A" text-anchor="middle">SEAL</text>
  </g>

  <!-- Signatures -->
  <g transform="translate(70, 310)">
    <!-- Line -->
    <line x1="0" y1="25" x2="160" y2="25" stroke="#E8B040" stroke-width="1.5"/>
    <!-- Mock signature -->
    <path d="M 20 15 Q 40 -10 60 15 T 100 15 T 140 10" fill="none" stroke="#C9931A" stroke-width="2"/>
    <!-- Title -->
    <text x="80" y="42" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="11" fill="#A1A1AA" text-anchor="middle">DIRECTOR OF TRAINING</text>
  </g>
</svg>
