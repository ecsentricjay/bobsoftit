<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Warm Light Background -->
  <rect width="600" height="400" fill="#FDF3DC" rx="12"/>
  
  <defs>
    <radialGradient id="deskGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9931A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C9931A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <circle cx="300" cy="220" r="200" fill="url(#deskGlow)" />

  <!-- Shared desk -->
  <ellipse cx="300" cy="310" rx="240" ry="40" fill="#E8B040" opacity="0.3" stroke="#C9931A" stroke-width="2" />

  <!-- Collaborative elements (arrows, light bulbs, gear wheels) in background -->
  <g fill="#C9931A" opacity="0.2">
    <!-- Lightbulb -->
    <path d="M 300 80 C 285 80 275 90 275 105 C 275 115 285 125 290 130 L 290 135 L 310 135 L 310 130 C 315 125 325 115 325 105 C 325 90 315 80 300 80 Z" />
    <rect x="292" y="137" width="16" height="4" rx="1" />
    <!-- Gear on left -->
    <circle cx="120" cy="100" r="15" stroke="#C9931A" stroke-width="4" fill="none"/>
    <!-- Gear on right -->
    <circle cx="480" cy="90" r="12" stroke="#C9931A" stroke-width="3" fill="none"/>
  </g>

  <!-- LEFT STUDENT (Data Analytics) -->
  <g>
    <!-- Silhouette -->
    <path d="M 110 320 C 110 270 170 270 170 320 Z" fill="#2D2D2D" />
    <circle cx="140" cy="245" r="18" fill="#2D2D2D" />
    <!-- Laptop -->
    <path d="M 140 290 L 195 290 L 205 305 L 130 305 Z" fill="#1A1A1A" />
    <rect x="155" y="248" width="40" height="28" rx="2" fill="#111111" />
    <!-- Laptop screen: Data Chart -->
    <rect x="158" y="251" width="34" height="22" rx="1" fill="#FFFFFF" />
    <!-- Mini bar chart in screen -->
    <rect x="162" y="265" width="4" height="6" fill="#10B981" />
    <rect x="168" y="259" width="4" height="12" fill="#3B82F6" />
    <rect x="174" y="255" width="4" height="16" fill="#C9931A" />
    <rect x="180" y="262" width="4" height="9" fill="#EF4444" />
  </g>

  <!-- CENTER STUDENT (Web Development) -->
  <g>
    <!-- Silhouette -->
    <path d="M 260 310 C 260 250 340 250 340 310 Z" fill="#1A1A1A" />
    <circle cx="300" cy="225" r="22" fill="#1A1A1A" />
    <!-- Laptop -->
    <path d="M 265 290 L 335 290 L 345 308 L 255 308 Z" fill="#2D2D2D" stroke="#C9931A" stroke-width="1.5" />
    <rect x="273" y="242" width="54" height="36" rx="2" fill="#0F172A" />
    <!-- Laptop screen: HTML Code -->
    <g fill="#38BDF8" font-family="monospace" font-size="4" font-weight="bold">
      <text x="277" y="250">&lt;div class="grid"&gt;</text>
      <text x="281" y="256">&lt;h1&gt;Bobsoft&lt;/h1&gt;</text>
      <text x="281" y="262">&lt;p&gt;Real Skills&lt;/p&gt;</text>
      <text x="277" y="268">&lt;/div&gt;</text>
    </g>
  </g>

  <!-- RIGHT STUDENT (Mobile App Dev) -->
  <g>
    <!-- Silhouette -->
    <path d="M 430 320 C 430 270 490 270 490 320 Z" fill="#2D2D2D" />
    <circle cx="460" cy="245" r="18" fill="#2D2D2D" />
    <!-- Laptop -->
    <path d="M 405 290 L 460 290 L 470 305 L 395 305 Z" fill="#1A1A1A" />
    <rect x="405" y="248" width="40" height="28" rx="2" fill="#111111" />
    <!-- Laptop screen: Mobile Phone layout -->
    <rect x="408" y="251" width="34" height="22" rx="1" fill="#F7F4EF" />
    <!-- Mobile phone outline in screen -->
    <rect x="418" y="252" width="14" height="20" rx="2" fill="#1A1A1A" />
    <circle cx="425" cy="261" r="2" fill="#C9931A" />
    <rect x="421" y="254" width="8" height="5" fill="#3B82F6" rx="1" />
  </g>

  <!-- Chat Bubbles connecting them -->
  <g font-family="'Space Grotesk', sans-serif" font-weight="bold">
    <!-- Bubble left to center -->
    <path d="M 190 140 C 190 120 220 120 220 140 C 220 150 205 155 200 160 L 195 160 Z" fill="#C9931A" />
    <text x="205" y="143" font-size="8" fill="#FDF3DC" text-anchor="middle">Data!</text>

    <!-- Bubble right to center -->
    <path d="M 410 130 C 410 110 440 110 440 130 C 440 140 425 145 420 150 L 415 150 Z" fill="#1A1A1A" />
    <text x="425" y="133" font-size="8" fill="#E8B040" text-anchor="middle">UI UX!</text>

    <!-- Center active bulb lines -->
    <line x1="300" y1="145" x2="300" y2="160" stroke="#C9931A" stroke-width="2" stroke-dasharray="2 2" />
  </g>
</svg>
